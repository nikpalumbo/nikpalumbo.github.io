#-------------------------------
# General Site Settings
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://sdw.solutions" # the base hostname & protocol for your site, e.g. http://example.com


#-------------------------------
# Build Settings
markdown: kramdown
permalink: /:title
plugins:
  - jekyll-sitemap

# SVG MIME type handling
include: [".htaccess", "_headers"]

#-------------------------------
# Collections
collections:
  pages:
    output: true
    permalink: /:name
  works:
    output: true
    permalink: /case-studies/:slug

# Pages Path
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "works"
    values:
      layout: "work"

sass:
  sass_dir: _sass
  style: compressed