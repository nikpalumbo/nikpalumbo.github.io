#-------------------------------
# Process Settings
process:
  enable: true
  process__title: "Fast Starts. Real Outcomes. No Guesswork."
  process__description: "I work with a lean, agile process that's been shaped by both startup urgency and enterprise precision."
  process__content: |
    Every engagement begins with a **structured scoping session** using battle-tested tools from top consulting frameworks—so we define the right goals, outcomes, and constraints from day one.

    From there, I move fast:

    - We break work into **short MVP cycles**, launching quickly to validate
    - You get **working prototypes in days**, not months  
    - I handle the full stack—from scoping to wireframes to working code

    Whether you're looking to experiment fast or build something production-ready, I bring a **founder's mindset**, a **product owner's discipline**, and **technical fluency**—so nothing gets lost in translation.

    Every sprint ends with something real. Every decision is tied to business value.
    
    **You stay focused on results. I handle the build.**
    
  process__highlights:
    - title: "Founder's Mindset"
      icon: "ion ion-md-bulb"
      description: "I understand the urgency of building something that works and drives real business value."
      
    - title: "Product Discipline" 
      icon: "ion ion-md-checkmark-circle"
      description: "Every feature and decision is validated against clear business outcomes and user needs."
      
    - title: "Technical Fluency"
      icon: "ion ion-md-code"
      description: "Full-stack execution from concept to deployment, with no translation gaps."


