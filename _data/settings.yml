#-------------------------------
# Services Settings
services:
  enable: true
  services__title: My Services
  services__description: I turn business challenges into working solutions through four core offerings
  
service__items:
  - title: "Intelligent Growth Systems"
    icon: "ion ion-md-trending-up"
    description: "I design and implement full-funnel growth engines—from value proposition to lead conversion. We define your ideal customer profiles, select the best channels, craft compelling outreach, and automate workflows inside your CRM or marketing stack."
    outcomes:
      - "Clear positioning and messaging that resonates with your market"
      - "Consistent flow of qualified leads from multiple channels" 
      - "Reduced manual effort in outreach and follow-up"
      - "CRM workflows that scale with your business"
    
  - title: "AI Agent Development"
    icon: "ion ion-md-cog"
    description: "I turn business challenges into working AI solutions. Whether it's an internal assistant, a customer-facing bot, or a domain-specific tool, I design, build, and deploy agents tailored to your workflows."
    price_range: "CHF 5K MVPs to CHF 30K production rollouts, 6–12 weeks"
    outcomes:
      - "A faster way to handle repetitive tasks or customer interactions"
      - "Custom solutions built on your data, not generic templates"
      - "Clear ROI through automation and time savings"
      - "Scalable tools that grow with your team and tech stack"
    
  - title: "Smart Conversion Websites"
    icon: "ion ion-md-desktop"
    description: "I create high-performance websites designed to convert users, not just inform. Fast, mobile-first, and integrated with AI features like guided onboarding, instant quotes, or personalized content."
    outcomes:
      - "Higher engagement and conversion rates from day one"
      - "Faster load times and mobile optimization for better UX and SEO"
      - "Seamless integration with your existing systems (CRM, analytics, chat)"
      - "A flexible platform you can update without relying on developers"
    
  - title: "Product-Led Growth Prototyping"
    icon: "ion ion-md-rocket"
    description: "I build real, functional web applications that help you validate product ideas, onboard users, or launch internal tools—fast. These are production-grade MVPs, designed to test real usage and drive growth."
    outcomes:
      - "Fully functional web apps delivered in weeks, not months"
      - "Rapid experimentation with real users, not mockups"
      - "Built-in analytics to measure engagement, retention, and conversion"
      - "Architecture ready to scale or evolve into full products when validated"

