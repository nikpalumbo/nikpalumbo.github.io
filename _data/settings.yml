# Testimonials Section
testimonials:
  enable: true

testimonial__title: Voices of AI Leadership
testimonial__description:

testimonial__items:
  - name: "Sundar Pichai"
    image: "/images/client-1.jpg"
    designation: "CEO of Google"
    link: "#"
    content : "The future of AI is not about replacing humans, it's about augmenting human capabilities."

  - name: "Satya Nadella"
    image: "/images/client-2.jpg"
    designation: "CEO of Microsoft"
    link: "#"
    content : "AI agents will become the primary way we interact with computers in the future. They will be able to understand our needs and preferences, and proactively help us with tasks and decision making"

  - name: "Sam Altman"
    image: "/images/client-3.jpg"
    designation: "CEO of OpenAI"
    link: "#"
    content : "Generative AI is a tool that can be used for good or bad, and we need to be mindful of its potential impact on society."

  - name: "Andrew Ng"
    image: "/images/client-4.jpg"
    designation: "Co-founder of Google Brain"
    link: "#"
    content : "AI is like electricity. Just as electricity transformed every major industry a century ago, AI is now poised to do the same."

  - name: "Elon Musk"
    image: "/images/client-5.jpg"
    designation: "CEO of Tesla and SpaceX"
    link: "#"
    content : "Mark my words… AI is far more dangerous than nukes."

  - name: "Fei-Fei Li"
    image: "/images/client-6.jpg"
    designation: "Professor at Stanford University"
    link: "#"
    content : "Artificial intelligence is not a substitute for human intelligence; it is a tool to amplify human creativity and ingenuity."

  - name: "Geoffrey Hinton"
    image: "/images/client-7.jpg"
    designation: "AI Pioneer"
    link: "#"
    content : "I thought [AI] was 30 to 50 years or even longer away. Obviously, I no longer think that."

  - name: "Vinod Khosla"
    image: "/images/client-8.jpg"
    designation: "Venture Capitalist"
    link: "#"
    content : "Keeping your eye on the ball while performing a deep dive on the start-up mentality to derive convergence on cross-platform integration"

  - name: "Shantanu Narayen"
    image: "/images/client-9.jpg"
    designation: "CEO of Adobe"
    link: "#"
    content : "People who use AI will replace those who don't."


