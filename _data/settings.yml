# Process Settings
process:
  enable: true
  process__title: "Fast Starts. Real Outcomes. No Guesswork."
  process__subtitle: "HOW"
  process__description: "I work with a lean, agile process that's been shaped by both startup urgency and enterprise precision."
  
  process__approach:
    title: "Structured Start, Agile Execution"
    description: "Every engagement begins with a structured scoping session using battle-tested tools from top consulting frameworks so we define the right goals, outcomes, and constraints from day one."
    
  process__methodology:
    - step: "01"
      title: "MVP Cycles"
      description: "We break work into short MVP cycles, launching quickly to validate."
      icon: "ion ion-md-refresh"
      
    - step: "02" 
      title: "Fast Prototypes"
      description: "You get working prototypes in days, not months."
      icon: "ion ion-md-flash"
      
    - step: "03"
      title: "Full-Stack Execution"  
      description: "I handle the full stack—from scoping to wireframes to working code."
      icon: "ion ion-md-construct"
      
  process__value_props:
    - title: "Founder's Mindset"
      description: "Business urgency with strategic thinking"
      
    - title: "Product Owner's Discipline"
      description: "Every decision tied to business value"
      
    - title: "Technical Fluency"
      description: "Nothing gets lost in translation"
      
  process__promise: "Every sprint ends with something real. Every decision is tied to business value. You stay focused on results. I handle the build."


