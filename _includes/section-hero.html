{% if site.data.settings.hero.enable == true %}
<!-- begin hero -->
<section class="hero">
  <div class="container">
    <div class="row">
      <div class="col col-12">
        <div class="hero__content">
          <div class="hero__badge">{{ site.data.settings.hero.hero__badge }}</div>
          <h1 class="hero__title">{{ site.data.settings.hero.hero__title }}</h1>
          <p class="hero__description">{{ site.data.settings.hero.hero__description }}</p>
          
          {% if site.data.settings.mailchimp.enable == true %}
          <div class="hero__buttons">
            <a href="#services" class="button button--primary">Get Started</a>
            <a href="/contact/" class="button button--secondary">Book a Call</a>
          </div>
          {% endif %}
        </div>
      </div>
    </div>
    
    
  </div>
</section>
<!-- end hero -->
{% endif %}
