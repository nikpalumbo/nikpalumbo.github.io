<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.data.settings.title }}{% endif %}</title>
  <meta name='description' content='{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.data.settings.description }}{% endif %}'>
  
  <!-- SEO Meta Tags -->
  <meta name="keywords" content="{% if page.keywords %}{{ page.keywords }}{% else %}AI agent development, intelligent growth systems, smart conversion websites, SaaS growth consultant, AI automation, startup growth, SME automation, enterprise AI, Swiss AI developer, conversion optimization{% endif %}">
  <meta name="author" content="Nicola Palumbo">
  <meta name="robots" content="index, follow">
  <meta name="language" content="English">
  <meta name="revisit-after" content="7 days">
  
  <!-- Geographic SEO -->
  <meta name="geo.region" content="CH-SZ">
  <meta name="geo.placename" content="Freienbach, Switzerland">
  <meta name="geo.position" content="47.2043;8.7584">
  <meta name="ICBM" content="47.2043, 8.7584">

  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.data.settings.title | escape }}" href="{{ "/feed.xml" | relative_url }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.url == "/" %}{{ site.data.settings.title }}{% else %}{{ page.title }} – {{ site.data.settings.title }}{% endif %}">
  <meta name="twitter:description" content="{% if page.url == "/" %}{{ site.data.settings.description | strip_html | xml_escape }}{% elsif page.description %}{{ page.description | strip_html | xml_escape }}{% else %}{{ page.excerpt | strip_html | xml_escape }}{% endif %}">
  <meta name="twitter:image:src" content="{{ page.image | absolute_url }}">

  <!-- Facebook OpenGraph -->
  <meta property="og:title" content="{% if page.url == "/" %}{{ site.data.settings.title }}{% else %}{{ page.title }} – {{ site.data.settings.title }}{% endif %}">
  <meta property="og:description" content="{% if page.url == "/" %}{{ site.data.settings.description | strip_html | xml_escape }}{% elsif page.description %}{{ page.description | strip_html | xml_escape }}{% else %}{{ page.excerpt | strip_html | xml_escape }}{% endif %}">
  <meta property="og:image" content="{{ page.image | absolute_url }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.gstatic.com">

  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&display=swap" as="style">

  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&display=swap" rel="stylesheet">

  <!-- Ionicons -->
  <link rel="preload" href="https://unpkg.com/ionicons@4.5.0/dist/css/ionicons.min.css" as="style">

  <link href="https://unpkg.com/ionicons@4.5.0/dist/css/ionicons.min.css" rel="stylesheet">

  <script>
    {% if site.data.settings.color_scheme == "auto" %}
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.setAttribute("dark", "");
      document.documentElement.classList.add('dark-mode');
    }
    {% elsif site.data.settings.color_scheme == "light" %}
      document.documentElement.setAttribute("light", "");
      document.documentElement.classList.add('light-mode');
    {% elsif site.data.settings.color_scheme == "dark" %}
      document.documentElement.setAttribute("dark", "");
      document.documentElement.classList.add('dark-mode');
    {% else %}
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.setAttribute("dark", "");
      document.documentElement.classList.add('dark-mode');
    }
    {% endif %}
  </script>

  <style>
  {% capture include_to_scssify %}
    {% include main.scss %}
  {% endcapture %}
  {{ include_to_scssify | scssify }}
  </style>

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Smart Data Way GmbH",
    "alternateName": "Nicola Palumbo",
    "url": "{{ site.url }}",
    "logo": "{{ site.url }}/images/sdw.png",
    "description": "{{ site.data.settings.description }}",
    "founder": {
      "@type": "Person",
      "name": "Nicola Palumbo",
      "jobTitle": "AI Product Manager & Growth Strategist",
      "url": "{{ site.url }}/about/"
    },
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Seestrasse 112",
      "addressLocality": "Freienbach",
      "postalCode": "8806",
      "addressCountry": "CH"
    },
    "geo": {
      "@type": "GeoCoordinates",
      "latitude": 47.2043,
      "longitude": 8.7584
    },
    "areaServed": ["Switzerland", "Europe", "Global"],
    "serviceType": [
      "AI Agent Development",
      "Intelligent Growth Systems",
      "Smart Conversion Websites",
      "SaaS Growth Consulting",
      "Process Automation",
      "Digital Transformation"
    ],
    "sameAs": [
      "https://github.com/nikpalumbo",
      "https://linkedin.com/in/nicolapalumbo"
    ]
  }
  </script>

  {% if page.url == "/" %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ProfessionalService",
    "name": "{{ site.data.settings.title }}",
    "description": "{{ site.data.settings.description }}",
    "url": "{{ site.url }}",
    "image": "{{ site.url }}/images/sdw.png",
    "provider": {
      "@type": "Organization",
      "name": "Smart Data Way GmbH"
    },
    "serviceArea": {
      "@type": "Country",
      "name": "Switzerland"
    },
    "hasOfferCatalog": {
      "@type": "OfferCatalog",
      "name": "AI & Growth Services",
      "itemListElement": [
        {
          "@type": "Offer",
          "itemOffered": {
            "@type": "Service",
            "name": "AI Agent Development",
            "description": "Custom AI agents for automation and intelligent workflows"
          }
        },
        {
          "@type": "Offer",
          "itemOffered": {
            "@type": "Service",
            "name": "Intelligent Growth Systems",
            "description": "Scalable systems for lead generation and business growth"
          }
        },
        {
          "@type": "Offer",
          "itemOffered": {
            "@type": "Service",
            "name": "Smart Conversion Websites",
            "description": "High-converting websites optimized for growth"
          }
        }
      ]
    }
  }
  </script>
  {% endif %}
</head>
